# Host nginx on Hostinger VPS — domain pg.mapims.edu.in
#
# DNS: point pg.mapims.edu.in A record → your VPS IP
#
# Install:
#   sudo cp nginx/pg.mapims.edu.in.conf /etc/nginx/sites-available/pg.mapims.edu.in
#   sudo ln -sf /etc/nginx/sites-available/pg.mapims.edu.in /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (Let's Encrypt):
#   sudo certbot --nginx -d pg.mapims.edu.in
#
# Docker stack must be running: docker compose up -d
# (proxies to app on 127.0.0.1:8092)

server {
    listen 80;
    server_name pg.mapims.edu.in;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8092;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

# certbot adds listen 443 ssl and certificate paths after you run:
#   sudo certbot --nginx -d pg.mapims.edu.in
